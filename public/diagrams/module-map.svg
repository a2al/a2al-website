<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A2AL module architecture diagram" style="width:100%;max-width:760px;display:block;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e3b38"/>
    </marker>
  </defs>

  <!-- daemon -->
  <rect x="1" y="1" width="758" height="64" rx="8" fill="#111414" stroke="#1e2422" stroke-width="1.5"/>
  <text x="380" y="27" text-anchor="middle" fill="#00d4aa" font-family="JetBrains Mono,Menlo,Consolas,monospace" font-size="14" font-weight="600">daemon</text>
  <text x="380" y="49" text-anchor="middle" fill="#6b7b77" font-family="Inter,ui-sans-serif,sans-serif" font-size="12">REST API - MCP Server - Web UI - auto-publish</text>

  <!-- arrow: daemon to host -->
  <line x1="380" y1="65" x2="380" y2="98" stroke="#2e3b38" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- host -->
  <rect x="1" y="100" width="758" height="64" rx="8" fill="#111414" stroke="#1e2422" stroke-width="1.5"/>
  <text x="380" y="126" text-anchor="middle" fill="#00d4aa" font-family="JetBrains Mono,Menlo,Consolas,monospace" font-size="14" font-weight="600">host</text>
  <text x="380" y="148" text-anchor="middle" fill="#6b7b77" font-family="Inter,ui-sans-serif,sans-serif" font-size="12">DHT + QUIC + NAT sensing + UPnP + ICE fallback</text>

  <!-- arrows: host to row 3 -->
  <line x1="92"  y1="164" x2="92"  y2="198" stroke="#2e3b38" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="284" y1="164" x2="284" y2="198" stroke="#2e3b38" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="476" y1="164" x2="476" y2="198" stroke="#2e3b38" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="668" y1="164" x2="668" y2="198" stroke="#2e3b38" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- dht: x=1, w=182, center=92 -->
  <rect x="1" y="200" width="182" height="70" rx="8" fill="#111414" stroke="#1e2422" stroke-width="1.5"/>
  <text x="92" y="228" text-anchor="middle" fill="#00d4aa" font-family="JetBrains Mono,Menlo,Consolas,monospace" font-size="13" font-weight="600">dht</text>
  <text x="92" y="249" text-anchor="middle" fill="#6b7b77" font-family="Inter,ui-sans-serif,sans-serif" font-size="11">Kademlia DHT</text>

  <!-- transport: x=193, w=182, center=284 -->
  <rect x="193" y="200" width="182" height="70" rx="8" fill="#111414" stroke="#1e2422" stroke-width="1.5"/>
  <text x="284" y="228" text-anchor="middle" fill="#00d4aa" font-family="JetBrains Mono,Menlo,Consolas,monospace" font-size="13" font-weight="600">transport</text>
  <text x="284" y="249" text-anchor="middle" fill="#6b7b77" font-family="Inter,ui-sans-serif,sans-serif" font-size="11">UDPMux</text>

  <!-- natsense: x=385, w=182, center=476 -->
  <rect x="385" y="200" width="182" height="70" rx="8" fill="#111414" stroke="#1e2422" stroke-width="1.5"/>
  <text x="476" y="222" text-anchor="middle" fill="#00d4aa" font-family="JetBrains Mono,Menlo,Consolas,monospace" font-size="13" font-weight="600">natsense</text>
  <text x="476" y="240" text-anchor="middle" fill="#6b7b77" font-family="Inter,ui-sans-serif,sans-serif" font-size="11">natmap</text>
  <text x="476" y="257" text-anchor="middle" fill="#6b7b77" font-family="Inter,ui-sans-serif,sans-serif" font-size="11">UPnP IGD</text>

  <!-- signaling: x=577, w=182, center=668 -->
  <rect x="577" y="200" width="182" height="70" rx="8" fill="#111414" stroke="#1e2422" stroke-width="1.5"/>
  <text x="668" y="228" text-anchor="middle" fill="#00d4aa" font-family="JetBrains Mono,Menlo,Consolas,monospace" font-size="13" font-weight="600">signaling</text>
  <text x="668" y="249" text-anchor="middle" fill="#6b7b77" font-family="Inter,ui-sans-serif,sans-serif" font-size="11">ICE / WebSocket</text>

  <!-- arrow: dht to protocol -->
  <line x1="92" y1="270" x2="92" y2="304" stroke="#2e3b38" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- protocol: x=1, w=540 -->
  <rect x="1" y="306" width="540" height="64" rx="8" fill="#111414" stroke="#1e2422" stroke-width="1.5"/>
  <text x="271" y="332" text-anchor="middle" fill="#00d4aa" font-family="JetBrains Mono,Menlo,Consolas,monospace" font-size="14" font-weight="600">protocol</text>
  <text x="271" y="354" text-anchor="middle" fill="#6b7b77" font-family="Inter,ui-sans-serif,sans-serif" font-size="12">wire format - CBOR records - mailbox - topic</text>

  <!-- arrow: protocol to identity -->
  <line x1="92" y1="370" x2="92" y2="404" stroke="#2e3b38" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- identity / crypto: x=1, w=420 -->
  <rect x="1" y="406" width="420" height="64" rx="8" fill="#111414" stroke="#1e2422" stroke-width="1.5"/>
  <text x="211" y="432" text-anchor="middle" fill="#00d4aa" font-family="JetBrains Mono,Menlo,Consolas,monospace" font-size="14" font-weight="600">identity / crypto</text>
  <text x="211" y="454" text-anchor="middle" fill="#6b7b77" font-family="Inter,ui-sans-serif,sans-serif" font-size="12">AID derivation - signing - delegation</text>
</svg>
